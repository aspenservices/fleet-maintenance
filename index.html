<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspen Spas — Fleet Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#151821;--bg2:#1a1e2a;--card:#1f2433;--border:#2a3148;--text:#e2e5ef;--dim:#6e7a9a;--accent:#2d7dd2;--abg:rgba(45,125,210,.1);--aglow:rgba(45,125,210,.2);--grn:#22c55e;--gbg:rgba(34,197,94,.1);--yel:#eab308;--ybg:rgba(234,179,8,.08);--red:#ef4444;--rbg:rgba(239,68,68,.08);--pur:#a78bfa;--pbg:rgba(167,139,250,.08);--cyn:#06b6d4;--cbg:rgba(6,182,212,.08);--ibg:#171b27;--r:10px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
input,select,textarea{font-family:inherit;color:var(--text)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)!important;outline:none}

/* Header */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{height:36px}
.hdr-div{width:1px;height:28px;background:var(--border)}
.hdr h1{font-size:17px;font-weight:800;margin:0}
.hdr p{font-size:10px;color:var(--dim);margin:0}

/* 3-Panel Layout */
.layout{display:grid;grid-template-columns:220px 1fr 300px;height:calc(100vh - 82px);overflow:hidden}
.sidebar{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:14px}
.center{overflow-y:auto;padding:18px 22px}
.rightbar{background:var(--card);border-left:1px solid var(--border);overflow-y:auto;padding:14px}

/* Sidebar */
.sb-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding:0 4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:4px;transition:all .15s;border:1px solid transparent}
.sb-item:hover{background:var(--bg2);border-color:var(--border)}
.sb-item.on{background:var(--abg);border-color:var(--accent);color:var(--accent)}
.sb-item .sb-icon{font-size:18px}
.sb-item .sb-name{flex:1;font-size:13px;font-weight:600}
.sb-item .sb-cnt{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--bg2)}
.sb-item.on .sb-cnt{background:rgba(45,125,210,.15);color:var(--accent)}
.sb-add{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r);cursor:pointer;color:var(--dim);font-size:12px;font-weight:600;border:1px dashed var(--border);margin-top:8px;transition:all .15s}
.sb-add:hover{border-color:var(--accent);color:var(--accent);background:var(--abg)}
.sb-divider{height:1px;background:var(--border);margin:12px 0}
.sb-dash{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:4px;transition:all .15s;font-size:13px;font-weight:600;color:var(--dim)}
.sb-dash:hover{background:var(--bg2)}
.sb-dash.on{background:var(--abg);color:var(--accent)}
.sb-dash .sb-alert{padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--rbg);color:var(--red)}

/* Right bar */
.rb-title{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.rb-item{padding:10px 12px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s}
.rb-item:hover{border-color:var(--accent)}
.rb-item .rb-date{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:2px}
.rb-item .rb-name{font-size:12px;font-weight:600}
.rb-item .rb-meta{font-size:10px;color:var(--dim);margin-top:2px}
.rb-item .rb-days{display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px}
.rb-item.overdue{border-left:3px solid var(--red)}
.rb-item.soon{border-left:3px solid var(--yel)}
.rb-item.sched{border-left:3px solid var(--accent)}
.rb-empty{text-align:center;padding:20px;color:var(--dim);font-size:12px}

/* Tabs */
.tabs{display:flex;gap:3px;padding:3px;background:var(--card);border-radius:12px;border:1px solid var(--border);width:fit-content;margin-bottom:18px;flex-wrap:wrap}
.tab{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:9px;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--bg2)}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--aglow)}
.tab .cnt{padding:1px 7px;border-radius:14px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tab.on .cnt{background:rgba(255,255,255,.2)}
.tab:not(.on) .cnt{background:var(--bg2)}

/* Stats row */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.st{padding:8px 14px;border-radius:9px;display:flex;align-items:center;gap:8px}
.st .n{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.st .l{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.st-g{background:var(--gbg);color:var(--grn);border:1px solid rgba(34,197,94,.12)}
.st-y{background:var(--ybg);color:var(--yel);border:1px solid rgba(234,179,8,.12)}
.st-r{background:var(--rbg);color:var(--red);border:1px solid rgba(239,68,68,.12)}
.st-p{background:var(--pbg);color:var(--pur);border:1px solid rgba(124,58,237,.12)}
.st-od{background:var(--rbg);border:1px dashed rgba(239,68,68,.35);color:var(--red);font-size:11px;font-weight:700;padding:8px 12px;border-radius:9px;display:flex;align-items:center;gap:4px}

/* Toolbar */
.tbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.inp{padding:9px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--ibg);color:var(--text);font-size:13px;outline:none;transition:border .15s}
.tbar .inp{background:var(--card)}
.tbar input{flex:1;min-width:180px}
.tbar select{min-width:140px}

/* Buttons */
.bp{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 10px var(--aglow)}
.bp:hover{filter:brightness(1.1)}
.bs{padding:8px 16px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;font-size:12px;cursor:pointer}
.bs:hover{border-color:var(--accent);color:var(--accent)}
.bi{width:28px;height:28px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.bi:hover{background:var(--bg2);color:var(--text)}
.bi.danger:hover{background:var(--rbg);color:var(--red)}
.bsm{padding:6px 14px;font-size:11px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}

/* Card */
.ecard{background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;overflow:hidden;position:relative;transition:all .2s}
.ecard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.ecard .od-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--yel));z-index:1}
.ecard-img{height:85px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--border)}
.ecard-img img{width:100%;height:100%;object-fit:cover}
.ecard-img .ph{font-size:30px;opacity:.1}
.ecard-body{padding:12px 14px}
.ecard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.ecard-name{font-size:14px;font-weight:700}
.ecard-sub{font-size:11px;color:var(--dim)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600}
.badge .dot{width:6px;height:6px;border-radius:50%}
.b-op{background:var(--gbg);color:var(--grn)}.b-op .dot{background:var(--grn)}
.b-mt{background:var(--ybg);color:var(--yel)}.b-mt .dot{background:var(--yel)}
.b-os{background:var(--rbg);color:var(--red)}.b-os .dot{background:var(--red)}
.b-pn{background:var(--pbg);color:var(--pur)}.b-pn .dot{background:var(--pur)}
.ecard-info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:7px}
.ib{padding:4px 8px;border-radius:5px;background:var(--bg2)}
.ib .il{font-size:8px;color:var(--dim);text-transform:uppercase}
.ib .iv{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ecard-foot{display:flex;justify-content:space-between;align-items:center}
.ecard-meta{display:flex;gap:7px;font-size:10px;color:var(--dim)}
.ecard-acts{display:flex;gap:3px}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--dim)}
.empty .ei{font-size:40px;opacity:.12;margin-bottom:8px}

/* Modal */
.mover{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(5px)}
.modal{background:var(--card);border-radius:16px;width:95%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal.wide{max-width:980px}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.mhdr h3{font-size:16px;font-weight:700;margin:0}
.mbody{flex:1;overflow-y:auto;padding:20px}
.mfoot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* Form */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg .full,.fg3 .full{grid-column:1/-1}
.fd label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.fd input,.fd select,.fd textarea{width:100%;padding:9px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--ibg);font-size:13px;outline:none;transition:border .15s}
.fd textarea{resize:vertical;min-height:48px}

/* Photo area */
.pharea{display:flex;gap:14px;margin-bottom:18px}
.phprev{width:160px;height:115px;border-radius:var(--r);background:var(--bg2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;flex-shrink:0}
.phprev:hover{border-color:var(--accent)}
.phprev img{width:100%;height:100%;object-fit:cover}
.phprev .pp{text-align:center;color:var(--dim);font-size:11px}
.phprev .pp span{font-size:26px;display:block;opacity:.3}

/* Profile header */
.prohdr{display:flex;gap:18px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.prophoto{width:170px;height:125px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.prophoto img{width:100%;height:100%;object-fit:cover}
.prophoto .pp{font-size:40px;opacity:.12}
.prodet{flex:1;min-width:0}
.prodet h2{font-size:18px;font-weight:800;margin:0 0 4px}
.prodet .psub{font-size:12px;color:var(--dim);margin-bottom:10px}
.specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.spec{padding:5px 9px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border)}
.spec .sl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.spec .sv{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;word-break:break-all}
.spec.warn .sv{color:var(--red)}

/* Analysis cards */
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.ac{padding:11px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--card)}
.ac .al{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ac .av{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.ac .as{font-size:10px;color:var(--dim);margin-top:2px}

/* Score */
.score-wrap{display:flex;align-items:center;gap:8px}
.score-lbl{font-size:11px;font-weight:700}
.score-sub{font-size:10px;color:var(--dim)}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.chart-box{padding:14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border)}
.chart-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}

/* Log table */
.ltbl{width:100%;border-collapse:collapse}
.ltbl th{text-align:left;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:6px;border-bottom:2px solid var(--border);font-weight:600;white-space:nowrap}
.ltbl td{padding:7px 6px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.ltbl tr:hover td{background:var(--bg2)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.cost{color:var(--grn);font-weight:600}
.pri-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.pl{background:var(--grn)}.pm{background:var(--yel)}.ph{background:var(--red)}.pc{background:#991b1b}

/* Record form */
.recform{padding:14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);margin-bottom:14px}
.recform .type-tabs{display:flex;gap:6px;margin-bottom:12px}

/* Totals */
.totals{display:flex;gap:14px;padding:10px 14px;border-radius:var(--r);background:var(--abg);margin-top:10px;flex-wrap:wrap}
.totals span{font-size:12px;color:var(--dim)}
.totals strong{color:var(--accent);font-family:'JetBrains Mono',monospace}

/* Tags */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tag{padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600}

/* Cat manager */
.catlist{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.catitem{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border)}
.catitem .ci-icon{font-size:18px}
.catitem .ci-name{flex:1;font-weight:600;font-size:14px}
.catitem .ci-meta{font-size:11px;color:var(--dim)}
.catform{padding:14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border)}
.catform .fg4{display:grid;grid-template-columns:60px 1fr 1fr 1fr;gap:10px}

/* Invoice overlay */
.inv-over{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:pointer}
.inv-over img{max-width:90%;max-height:85vh;border-radius:12px}

/* Sync bar */
.sync-bar{display:flex;align-items:center;gap:10px;padding:7px 24px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--dim)}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--grn)}.sync-dot.loading{background:var(--yel);animation:pulse 1s infinite}.sync-dot.err{background:var(--red)}.sync-dot.off{background:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-bar button{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-family:inherit;font-size:10px;cursor:pointer;font-weight:600}
.sync-bar button:hover{border-color:var(--accent);color:var(--accent)}

/* Setup screen */
.setup-over{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center}
.setup-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:92%;max-width:600px;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.setup-box h2{font-size:20px;font-weight:800;margin-bottom:4px}
.setup-box .lead{font-size:13px;color:var(--dim);margin-bottom:20px}
.stp{padding:14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);margin-bottom:12px}
.stp-n{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;margin-right:8px}
.stp h4{font-size:14px;font-weight:700;display:inline}
.stp p{font-size:12px;color:var(--dim);margin:5px 0;line-height:1.7}
.stp a{color:var(--accent);text-decoration:underline}
.stp code{background:var(--ibg);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);word-break:break-all}
.stp .code-block{display:block;background:var(--ibg);padding:10px 14px;border-radius:8px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);margin:8px 0;white-space:pre-wrap;word-break:break-all;line-height:1.6;cursor:pointer;position:relative}
.stp .code-block:hover::after{content:'Click to copy';position:absolute;top:4px;right:8px;font-size:9px;color:var(--accent);font-family:'Outfit',sans-serif}
.url-in{width:100%;padding:12px 16px;border-radius:var(--r);border:2px solid var(--border);background:var(--ibg);color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;margin-top:8px;outline:none}
.url-in:focus{border-color:var(--accent)}
.url-in::placeholder{color:var(--dim);font-family:'Outfit',sans-serif;font-size:12px}

/* Page nav */
.pnav{display:flex;gap:3px;padding:3px;background:var(--card);border-radius:12px;border:1px solid var(--border);width:fit-content;margin-bottom:18px}
.pnav-btn{display:flex;align-items:center;gap:6px;padding:9px 20px;border-radius:9px;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.pnav-btn:hover{color:var(--text);background:var(--bg2)}
.pnav-btn.on{background:var(--accent);color:#fff;box-shadow:0 2px 10px var(--aglow)}
.pnav-btn .pn-badge{padding:1px 7px;border-radius:14px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-left:2px}
.pnav-btn.on .pn-badge{background:rgba(255,255,255,.2)}
.pnav-btn:not(.on) .pn-badge{background:var(--bg2)}

/* Dashboard cards */
.dash-section{margin-bottom:24px}
.dash-section h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dash-section .dash-count{padding:2px 9px;border-radius:14px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.dash-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s}
.dash-item:hover{border-color:var(--accent);transform:translateX(3px)}
.dash-item .di-icon{font-size:22px;flex-shrink:0}
.dash-item .di-photo{width:44px;height:44px;border-radius:8px;background:var(--bg2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.dash-item .di-photo img{width:100%;height:100%;object-fit:cover}
.dash-item .di-body{flex:1;min-width:0}
.dash-item .di-name{font-size:13px;font-weight:700}
.dash-item .di-meta{font-size:11px;color:var(--dim)}
.dash-item .di-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.dash-item .di-date{font-size:11px;font-family:'JetBrains Mono',monospace}
.dash-item .di-days{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.dash-item.overdue{border-left:3px solid var(--red)}
.dash-item.upcoming{border-left:3px solid var(--yel)}
.dash-item.scheduled{border-left:3px solid var(--accent)}

/* Schedule form */
.sched-form{padding:16px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);margin-bottom:14px}
.sched-list{display:flex;flex-direction:column;gap:6px}
.sched-entry{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);background:var(--card);border:1px solid var(--border)}
.sched-entry .se-date{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap}
.sched-entry .se-body{flex:1;min-width:0}
.sched-entry .se-title{font-size:13px;font-weight:600}
.sched-entry .se-meta{font-size:11px;color:var(--dim)}
.sched-entry .se-acts{display:flex;gap:3px}

/* Dashboard summary cards */
.dsummary{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:22px}
.dsum-card{padding:16px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.dsum-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.dsum-card .ds-icon{font-size:28px}
.dsum-card .ds-num{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.dsum-card .ds-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* Upcoming timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:1px}
.tl-item{position:relative;padding:0 0 16px 16px}
.tl-item::before{content:'';position:absolute;left:-20px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--bg)}
.tl-item.tl-overdue::before{border-color:var(--red);background:var(--red)}
.tl-item.tl-soon::before{border-color:var(--yel);background:var(--yel)}
.tl-item.tl-sched::before{border-color:var(--accent);background:var(--accent)}
.tl-item.tl-ok::before{border-color:var(--grn);background:var(--grn)}

/* Calendar */
.cal{border-radius:var(--r);border:1px solid var(--border);background:var(--card);overflow:hidden}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.cal-hdr .cal-title{font-size:14px;font-weight:700}
.cal-hdr button{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;padding:4px 10px;font-family:inherit;font-size:11px;font-weight:600}
.cal-hdr button:hover{color:var(--accent);border-color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day-hdr{padding:6px;text-align:center;font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border)}
.cal-cell{min-height:70px;padding:4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-size:10px;cursor:pointer;transition:background .1s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.today{background:var(--abg)}
.cal-cell.other{opacity:.3}
.cal-cell .cd{font-weight:700;font-size:11px;margin-bottom:2px;font-family:'JetBrains Mono',monospace}
.cal-cell.today .cd{color:var(--accent)}
.cal-evt{padding:2px 4px;border-radius:4px;font-size:9px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-evt.ce-sched{background:var(--abg);color:var(--accent)}
.cal-evt.ce-over{background:var(--rbg);color:var(--red)}
.cal-evt.ce-due{background:var(--ybg);color:var(--yel)}
.cal-evt[draggable="true"]{cursor:grab}
.cal-evt[draggable="true"]:active{cursor:grabbing;opacity:.6}
.cal-cell.drag-over{background:var(--abg);outline:2px dashed var(--accent);outline-offset:-2px}

/* Fuel widget */
.fuel-widget{border-radius:var(--r);border:1px solid var(--border);background:var(--card);padding:16px;margin-bottom:18px}
.fuel-widget h4{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fuel-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:var(--rs);background:var(--bg2);margin-bottom:6px}
.fuel-row .fr-icon{font-size:16px}
.fuel-row .fr-name{flex:1;font-size:12px;font-weight:600}
.fuel-row .fr-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.fuel-row .fr-sub{font-size:10px;color:var(--dim)}
.fuel-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.fuel-summary .fs-card{padding:10px;border-radius:var(--rs);background:var(--bg2);text-align:center}
.fuel-summary .fs-num{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#f97316}
.fuel-summary .fs-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}

/* View toggle */
.vtoggle{display:flex;gap:2px;padding:2px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.vtoggle button{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--dim);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer}
.vtoggle button.on{background:var(--accent);color:#fff}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{display:flex;flex-direction:column;gap:4px}
.donut-legend .dl-item{display:flex;align-items:center;gap:6px;font-size:11px}
.donut-legend .dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Priority summary */
.pri-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:4px}

@media(max-width:1024px){
  .layout{grid-template-columns:1fr;height:auto}
  .sidebar{display:none}.rightbar{display:none}
  .center{height:auto}
}
@media(max-width:700px){
  .center{padding:12px}
  .grid{grid-template-columns:1fr}
  .fg,.fg3,.fg4{grid-template-columns:1fr!important}
  .prohdr{flex-direction:column}
  .prophoto{width:100%;height:150px}
  .chart-row{grid-template-columns:1fr}
  .pharea{flex-direction:column}
  .phprev{width:100%;height:130px}
  .ecard-info{grid-template-columns:1fr 1fr}
  .stats{gap:5px}.st{padding:6px 10px}.st .n{font-size:16px}
  .tbar{flex-direction:column}.tbar input{min-width:auto;width:100%}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<input type="file" id="file-in" accept="image/*" style="display:none">
<input type="file" id="import-in" accept=".json" style="display:none">

<script>
// ═══════════════════════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════════════════════
const STATUS={operational:{l:'Operational',bc:'b-op',c:'var(--grn)',bg:'var(--gbg)'},maintenance:{l:'In Maintenance',bc:'b-mt',c:'var(--yel)',bg:'var(--ybg)'},out_of_service:{l:'Out of Service',bc:'b-os',c:'var(--red)',bg:'var(--rbg)'},pending:{l:'Pending',bc:'b-pn',c:'var(--pur)',bg:'var(--pbg)'}};
const PRI={low:{l:'Low',c:'var(--grn)',dc:'pl'},medium:{l:'Medium',c:'var(--yel)',dc:'pm'},high:{l:'High',c:'var(--red)',dc:'ph'},critical:{l:'Critical',c:'#991b1b',dc:'pc'}};
const PARTS=['Oil & Filter','Brakes','Tires','Battery','Transmission','Engine','Suspension','Electrical','A/C & Heating','Belts & Hoses','Hydraulic','General Inspection','Other'];
const DEF_CATS=[{id:'vehicles',name:'Vehicles',icon:'🚐',uL:'Miles',uK:'mileage',iL:'Plate',iK:'plate',extra:['vin','color']},{id:'forklifts',name:'Forklifts',icon:'🏗️',uL:'Hours',uK:'hours',iL:'S/N',iK:'serialNumber',extra:['capacity']}];

let D={categories:DEF_CATS,items:{},activeTab:'vehicles',scheduled:[]};
let state={search:'',filter:'all',modal:null,viewer:null,editor:null,editorNew:false,addingLog:false,viewInvoice:null,catMgr:false,page:'dashboard',schedForm:false,calView:'month',calDate:new Date()};
let fileCallback=null;

// ═══════════════════════════════════════════════════════
// FIREBASE CLOUD SYNC
// ═══════════════════════════════════════════════════════
const LS='aspen_fleet_v9';
const LS_FB='aspen_fleet_firebase_config';
let db=null;
let syncStatus='off';
let lastSync='';
let saveTimer=null;
let firebaseReady=false;

function loadLocal(){
  try{const s=localStorage.getItem(LS);if(s){const d=JSON.parse(s);D.categories=d.categories||DEF_CATS;D.items=d.items||{};D.activeTab=d.activeTab||DEF_CATS[0].id;D.scheduled=d.scheduled||[]}}catch(e){}
}
function saveLocal(){localStorage.setItem(LS,JSON.stringify(D))}

function initFirebase(url){
  try{
    // Extract project ID from Firebase URL
    // URL format: https://PROJECT-ID-default-rtdb.firebaseio.com
    const match=url.match(/https:\/\/(.+?)\.firebaseio\.com/);
    if(!match){alert('Invalid Firebase URL');return false}
    const dbUrl=url.endsWith('/')?url.slice(0,-1):url;

    // Only init once
    if(!firebase.apps.length){
      firebase.initializeApp({databaseURL:dbUrl});
    }
    db=firebase.database();
    firebaseReady=true;
    localStorage.setItem(LS_FB,url);
    return true;
  }catch(e){
    console.error('Firebase init error:',e);
    return false;
  }
}

function saveData(){
  saveLocal();
  if(!firebaseReady||!db)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    syncStatus='loading';renderSyncBar();
    db.ref('fleet').set(D).then(()=>{
      syncStatus='ok';lastSync=new Date().toLocaleTimeString();renderSyncBar();
    }).catch(e=>{
      console.error('Save error:',e);syncStatus='err';renderSyncBar();
    });
  },1500);
}

function loadFromCloud(cb){
  if(!firebaseReady||!db){cb();return}
  syncStatus='loading';renderSyncBar();
  db.ref('fleet').once('value').then(snap=>{
    const val=snap.val();
    if(val&&val.categories){
      D.categories=val.categories||DEF_CATS;
      D.items=val.items||{};
      D.activeTab=val.activeTab||DEF_CATS[0].id;
      D.scheduled=val.scheduled||[];
      saveLocal();
    }
    syncStatus='ok';lastSync=new Date().toLocaleTimeString();
    cb();
  }).catch(e=>{
    console.error('Load error:',e);syncStatus='err';
    loadLocal();cb();
  });
}

// Listen for realtime changes from other computers
function listenForChanges(){
  if(!firebaseReady||!db)return;
  db.ref('fleet').on('value',snap=>{
    const val=snap.val();
    if(val&&val.categories){
      // Only update if data is different (avoid loop)
      const remote=JSON.stringify(val);
      const local=JSON.stringify(D);
      if(remote!==local){
        D.categories=val.categories||DEF_CATS;
        D.items=val.items||{};
        D.activeTab=val.activeTab||D.activeTab;
        D.scheduled=val.scheduled||[];
        saveLocal();
        syncStatus='ok';lastSync=new Date().toLocaleTimeString();
        render();
      }
    }
  });
}

function renderSyncBar(){
  const el=document.getElementById('sync-bar');
  if(!el)return;
  const cls=syncStatus==='ok'?'ok':syncStatus==='loading'?'loading':syncStatus==='err'?'err':'off';
  const msg=syncStatus==='ok'?'Synced'+(lastSync?' at '+lastSync:''):syncStatus==='loading'?'Syncing...':syncStatus==='err'?'Sync error — saved locally':firebaseReady?'Connecting...':'Offline mode';
  el.innerHTML=`<span class="sync-dot ${cls}"></span><span>${firebaseReady?'☁️':'💾'} ${msg}</span><span style="flex:1"></span>${firebaseReady?`<button onclick="loadFromCloud(render)">🔄 Refresh</button>`:''}
  <button onclick="showSetup()">${firebaseReady?'⚙️ Cloud Settings':'☁️ Connect Cloud'}</button>`;
}

function showSetup(){
  const savedUrl=localStorage.getItem(LS_FB)||'';
  const el=document.createElement('div');el.id='setup-scr';el.className='setup-over';
  el.innerHTML=`<div class="setup-box">
    <h2>☁️ Cloud Setup — Firebase</h2>
    <p class="lead">Connect to Firebase so your data syncs across all computers in real time. One-time setup, takes 3 minutes.</p>

    <div class="stp"><span class="stp-n">1</span><h4>Create a Firebase Project</h4>
      <p>Go to <a href="https://console.firebase.google.com/" target="_blank">console.firebase.google.com</a></p>
      <p>Click <strong>"Create a project"</strong> (or "Add project") → Name it <strong>"fleet-maintenance"</strong> → Disable Google Analytics if asked → Click <strong>Create Project</strong></p>
    </div>

    <div class="stp"><span class="stp-n">2</span><h4>Create the Database</h4>
      <p>In the left menu click <strong>"Build" → "Realtime Database"</strong></p>
      <p>Click <strong>"Create Database"</strong> → Pick any location → Select <strong>"Start in test mode"</strong> → Click <strong>Enable</strong></p>
      <p>You'll see a URL at the top like:</p>
      <div class="code-block" onclick="navigator.clipboard.writeText(this.textContent)">https://fleet-maintenance-XXXXX-default-rtdb.firebaseio.com</div>
      <p>☝️ Copy that URL</p>
    </div>

    <div class="stp"><span class="stp-n">3</span><h4>Paste Your Database URL Here</h4>
      <input class="url-in" id="fb-url-in" placeholder="https://your-project-default-rtdb.firebaseio.com" value="${esc(savedUrl)}">
    </div>

    <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
      <button class="bs" onclick="document.getElementById('setup-scr')?.remove()">Cancel</button>
      <button class="bs" onclick="skipSetup()" style="color:var(--dim)">Use Offline</button>
      <button class="bp" onclick="connectFirebase()">☁️ Connect & Sync</button>
    </div>
    ${savedUrl?`<p style="font-size:10px;color:var(--dim);margin-top:10px;text-align:right">Current: <code>${esc(savedUrl.slice(0,55))}...</code></p>`:''}
  </div>`;
  document.body.appendChild(el);
}

function skipSetup(){
  document.getElementById('setup-scr')?.remove();
}

function connectFirebase(){
  const url=document.getElementById('fb-url-in').value.trim();
  if(!url){alert('Paste the Firebase Database URL');return}
  if(!url.includes('firebaseio.com')){alert('URL should look like: https://your-project-default-rtdb.firebaseio.com');return}
  if(initFirebase(url)){
    document.getElementById('setup-scr')?.remove();
    // Push local data to cloud first, then load
    const hasLocalData=Object.values(D.items).some(a=>a&&a.length>0);
    if(hasLocalData){
      syncStatus='loading';renderSyncBar();
      db.ref('fleet').set(D).then(()=>{
        syncStatus='ok';lastSync=new Date().toLocaleTimeString();
        listenForChanges();render();
      });
    } else {
      loadFromCloud(()=>{listenForChanges();render()});
    }
  }
}

function loadData(){
  loadLocal();
  const savedUrl=localStorage.getItem(LS_FB);
  if(savedUrl){
    if(initFirebase(savedUrl)){
      loadFromCloud(()=>{listenForChanges();render()});
    } else {
      render();
    }
  } else {
    render();
    const hasData=Object.values(D.items).some(a=>a&&a.length>0);
    if(!hasData)setTimeout(showSetup,600);
  }
}

function sendNotification(){} // placeholder for future email notifications
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function td(){return new Date().toISOString().slice(0,10)}
function od(d){return d&&new Date(d)<new Date()}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function dbtw(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}
function getCat(){return D.categories.find(c=>c.id===D.activeTab)||D.categories[0]||DEF_CATS[0]}
function getItems(){return D.items[D.activeTab]||[]}
function setItems(arr){D.items[D.activeTab]=arr;saveData()}

function calcScore(it){
  let s=100;
  if(od(it.nextService))s-=30;
  if(it.status==='out_of_service')s-=25;
  if(it.status==='maintenance')s-=10;
  if(it.status==='pending')s-=5;
  const lg=it.maintenanceLog||[];
  s-=lg.filter(l=>!l.completed).length*5;
  if(!lg.length)s-=10;
  s-=lg.filter(l=>!l.completed&&(l.priority==='high'||l.priority==='critical')).length*10;
  return Math.max(0,Math.min(100,s));
}

function badge(st){const s=STATUS[st]||STATUS.operational;return`<span class="badge ${s.bc}"><span class="dot"></span>${s.l}</span>`}
function priDot(p){return`<span class="pri-dot ${(PRI[p]||PRI.medium).dc}"></span>`}

function scoreRing(sc){
  const c=sc>=80?'var(--grn)':sc>=50?'var(--yel)':'var(--red)';
  const lb=sc>=80?'Excellent':sc>=50?'Fair':'Needs Attention';
  return`<div class="score-wrap"><svg width="44" height="44" viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="var(--border)" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${c}" stroke-width="4" stroke-dasharray="${sc*1.256} 999" stroke-linecap="round" transform="rotate(-90 24 24)"/><text x="24" y="28" text-anchor="middle" fill="${c}" font-size="12" font-weight="800" font-family="JetBrains Mono">${sc}</text></svg><div><div class="score-lbl" style="color:${c}">${lb}</div><div class="score-sub">Health Score</div></div></div>`;
}

function barChart(data,h,label){
  if(!data.length)return`<p style="color:var(--dim);font-size:12px;text-align:center;padding:12px">No data</p>`;
  const mx=Math.max(...data.map(d=>d.v),1);
  let svg=`<svg viewBox="0 0 ${data.length*40} ${h}" style="width:100%;height:${h}px;display:block">`;
  data.forEach((d,i)=>{const bh=(d.v/mx)*(h-24);svg+=`<rect x="${i*40+4}" y="${h-bh-16}" width="32" height="${bh}" rx="4" fill="${d.c||'var(--accent)'}" opacity=".85"/><text x="${i*40+20}" y="${h-bh-20}" text-anchor="middle" fill="var(--text)" font-size="9" font-weight="700" font-family="JetBrains Mono">${d.v}</text><text x="${i*40+20}" y="${h-2}" text-anchor="middle" fill="var(--dim)" font-size="8">${esc(d.l)}</text>`});
  svg+=`</svg>`;
  return`<div class="chart-title">${label}</div>${svg}`;
}

function resizeAndStore(file,max,q,cb){
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>h){if(w>max){h*=max/w;w=max}}else{if(h>max){w*=max/h;h=max}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q))};img.src=ev.target.result};
  r.readAsDataURL(file);
}

document.getElementById('file-in').addEventListener('change',function(e){
  const f=e.target.files?.[0];if(!f||!fileCallback)return;
  const max=fileCallback.max||400,q=fileCallback.quality||0.7;
  resizeAndStore(f,max,q,data=>{fileCallback.fn(data);fileCallback=null});
  e.target.value='';
});

function openFileDialog(fn,max,quality){
  fileCallback={fn,max:max||400,quality:quality||0.7};
  document.getElementById('file-in').click();
}

// ═══════════════════════════════════════════════════════
// RENDER MAIN
// ═══════════════════════════════════════════════════════
function render(){
  const allItems=[];
  D.categories.forEach(cat=>{(D.items[cat.id]||[]).forEach(it=>allItems.push({...it,_cat:cat}))});
  const overdueAll=allItems.filter(i=>od(i.nextService));
  const soon=allItems.filter(i=>i.nextService&&!od(i.nextService)&&dbtw(td(),i.nextService)<=14);
  const pendingAll=allItems.filter(i=>(i.maintenanceLog||[]).some(l=>!l.completed));
  const schedActive=D.scheduled.filter(s=>!s.done).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const alertCount=overdueAll.length+schedActive.length;

  document.getElementById('app').innerHTML=`
  <div class="hdr">
    <div class="hdr-left">
      <img src="https://aspenspas.com/build/logo.1f7cd0de.png" alt="Aspen Spas" class="hdr-logo" onerror="this.style.display='none'">
      <div class="hdr-div"></div>
      <div><h1>Fleet Maintenance</h1><p>Equipment & Vehicle Service Tracker</p></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="sync-bar" id="sync-bar" style="border:none;padding:0;background:none"></div>
      <button class="bs bsm" onclick="openCatMgr()">⚙️</button>
    </div>
  </div>

  <div class="layout">
    <!-- LEFT SIDEBAR: Categories -->
    <div class="sidebar">
      <div class="sb-title">Navigation</div>
      <div class="sb-dash ${state.page==='dashboard'?'on':''}" onclick="state.page='dashboard';render()">
        📊 Dashboard ${alertCount>0?`<span class="sb-alert">${alertCount}</span>`:''}
      </div>
      <div class="sb-divider"></div>
      <div class="sb-title">Categories</div>
      ${D.categories.map(c=>{
        const cnt=(D.items[c.id]||[]).length;
        const isOn=state.page==='fleet'&&D.activeTab===c.id;
        return`<div class="sb-item ${isOn?'on':''}" onclick="D.activeTab='${c.id}';state.page='fleet';state.search='';state.filter='all';saveData();render()">
          <span class="sb-icon">${c.icon}</span>
          <span class="sb-name">${esc(c.name)}</span>
          <span class="sb-cnt">${cnt}</span>
        </div>`;
      }).join('')}
      <div class="sb-add" onclick="openCatMgr()">＋ Add Category</div>
      <div class="sb-divider"></div>
      <div class="sb-dash ${state.page==='schedule'?'on':''}" onclick="state.page='schedule';render()">

        </div>`;
      }).join(''):`<div class="rb-empty">No scheduled items</div>`}
    </div>
  </div>`;
}

  const totalCostAll=allItems.reduce((s,it)=>(it.maintenanceLog||[]).reduce((s2,l)=>s2+Number(l.cost||0),s),0);
  const allLogs=[];allItems.forEach(it=>(it.maintenanceLog||[]).forEach(l=>allLogs.push({...l,_item:it})));

  // Status donut data
  const stCnt={operational:0,maintenance:0,out_of_service:0,pending:0};
  allItems.forEach(i=>stCnt[i.status]=(stCnt[i.status]||0)+1);
  const stColors={operational:'var(--grn)',maintenance:'var(--yel)',out_of_service:'var(--red)',pending:'var(--pur)'};
  const stTotal=allItems.length||1;

  // Donut SVG
  let donutSegs='',donutOff=0;
  const donutData=Object.entries(stCnt).filter(([k,v])=>v>0);

        ${priCnt.high?`<div style="flex:${priCnt.high};background:var(--red)"></div>`:''}
        ${priCnt.medium?`<div style="flex:${priCnt.medium};background:var(--yel)"></div>`:''}

        ${Object.entries(priCnt).filter(([k,v])=>v>0).map(([k,v])=>`<div style="display:flex;align-items:center;gap:5px;font-size:12px">${priDot(k)} <strong>${v}</strong> ${PRI[k].l}</div>`).join('')}
      </div>
      <div style="margin-top:10px">${schedActive.slice(0,3).map(s=>`<div style="padding:6px 10px;border-radius:6px;background:var(--bg2);margin-bottom:4px;font-size:11px;display:flex;justify-content:space-between"><span>${priDot(s.priority)} ${esc(s.title)}</span><span class="mono" style="color:var(--accent)">${s.date}</span></div>`).join('')}</div>

  <!-- Overdue + Upcoming Lists -->

  ${overdueAll.length>0?`
  <div class="dash-section">
    <h3 style="color:var(--red)">🚨 Overdue Services <span class="dash-count" style="background:var(--rbg);color:var(--red)">${overdueAll.length}</span></h3>
    ${overdueAll.sort((a,b)=>(a.nextService||'').localeCompare(b.nextService||'')).map(it=>{

      return`<div class="dash-item overdue" onclick="goToItem('${it._cat.id}','${it.id}')">

function renderFuelWidget(allItems){
  // Get current week boundaries (Sunday to Saturday)
  const now=new Date();const day=now.getDay();
  const sun=new Date(now);sun.setDate(now.getDate()-day);sun.setHours(0,0,0,0);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);sat.setHours(23,59,59);
  const sunStr=sun.toISOString().slice(0,10);
  const satStr=sat.toISOString().slice(0,10);

  // Collect all fuel records from this week across all items
  const weekFuel=[];
  allItems.forEach(it=>{
    (it.maintenanceLog||[]).forEach(l=>{
      if(l.recordType==='fuel'&&l.date>=sunStr&&l.date<=satStr){
        weekFuel.push({...l,itemName:it.name||'Unnamed',itemIcon:it._cat?it._cat.icon:'🚐'});
      }
    });
  });

  // Per-vehicle fuel this week
  const byVehicle={};
  weekFuel.forEach(f=>{
    if(!byVehicle[f.itemName])byVehicle[f.itemName]={gal:0,cost:0,icon:f.itemIcon,records:0};
    byVehicle[f.itemName].gal+=Number(f.fuelGallons||0);
    byVehicle[f.itemName].cost+=Number(f.cost||0);
    byVehicle[f.itemName].records++;
  });
  const vehList=Object.entries(byVehicle).sort((a,b)=>b[1].gal-a[1].gal);

  const totalGal=weekFuel.reduce((s,f)=>s+Number(f.fuelGallons||0),0);
  const totalCost=weekFuel.reduce((s,f)=>s+Number(f.cost||0),0);
  const avgPPG=weekFuel.length>0?(totalCost/totalGal).toFixed(2):'—';

  // Last 4 weeks comparison
  const weeks=[];
  for(let w=0;w<4;w++){
    const ws=new Date(sun);ws.setDate(ws.getDate()-w*7);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const wsStr=ws.toISOString().slice(0,10);
    const weStr=we.toISOString().slice(0,10);
    let wGal=0;
    allItems.forEach(it=>{(it.maintenanceLog||[]).forEach(l=>{
      if(l.recordType==='fuel'&&l.date>=wsStr&&l.date<=weStr)wGal+=Number(l.fuelGallons||0);
    })});
    weeks.push({l:w===0?'This':w===1?'Last':w+'w ago',v:Math.round(wGal*10)/10,c:w===0?'#f97316':'#fb923c'});
  }
  weeks.reverse();

  if(totalGal===0&&weeks.every(w=>w.v===0))return'';

  return`
  <div class="fuel-widget">
    <h4>⛽ Fuel Consumption — This Week <span style="font-size:10px;color:var(--dim);font-weight:500">(${sunStr} → ${satStr})</span></h4>
    <div class="fuel-summary">
      <div class="fs-card"><div class="fs-num">${totalGal.toFixed(1)}</div><div class="fs-lbl">Gallons</div></div>
      <div class="fs-card"><div class="fs-num">$${totalCost.toLocaleString()}</div><div class="fs-lbl">Total Cost</div></div>
      <div class="fs-card"><div class="fs-num">${avgPPG}</div><div class="fs-lbl">Avg $/Gal</div></div>
    </div>

    ${vehList.length>0?`
    <div style="margin-bottom:12px">
      ${vehList.map(([name,d])=>`<div class="fuel-row">
        <span class="fr-icon">${d.icon}</span>
        <span class="fr-name">${esc(name)}</span>
        <span class="fr-val" style="color:#f97316">${d.gal.toFixed(1)} gal</span>
        <span class="fr-val" style="color:var(--grn)">$${d.cost.toLocaleString()}</span>
        <span class="fr-sub">${d.records} fill${d.records>1?'s':''}</span>
      </div>`).join('')}
    </div>`:'<div style="text-align:center;padding:12px;font-size:12px;color:var(--dim)">No fuel records this week</div>'}

    <div style="padding:10px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border)">
      <div class="chart-title">Weekly Fuel Trend (Gallons)</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:60px;margin-top:8px">
        ${weeks.map(w=>{const h=weeks.some(x=>x.v>0)?Math.max(6,(w.v/Math.max(...weeks.map(x=>x.v),1))*50):6;
        return`<div style="flex:1;text-align:center"><div style="background:${w.c};height:${h}px;border-radius:4px;margin:0 auto;width:80%"></div><div style="font-size:11px;font-weight:700;font-family:'JetBrains Mono';color:#f97316;margin-top:3px">${w.v}</div><div style="font-size:8px;color:var(--dim)">${w.l}</div></div>`}).join('')}
      </div>
    </div>
  </div>`;
}

function goToItem(catId,itemId){

  state.page='fleet';state.search='';state.filter='all';
  render();
  setTimeout(()=>openViewer(itemId),100);
}

function renderSchedulePage(){
  const active=D.scheduled.filter(s=>!s.done).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const done=D.scheduled.filter(s=>s.done).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  // Collect all calendar events (scheduled + overdue + upcoming service dates)
  const allEvts=[];
  active.forEach(s=>allEvts.push({date:s.date,title:s.title,type:'sched',id:s.id,pri:s.priority}));
  D.categories.forEach(cat=>{(D.items[cat.id]||[]).forEach(it=>{
    if(it.nextService){
      const isOd=od(it.nextService);
      allEvts.push({date:it.nextService,title:it.name||'Unnamed',type:isOd?'over':'due',catId:cat.id,itemId:it.id});
    }
  })});

  return`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <h2 style="font-size:18px;font-weight:800">📅 Schedule</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="vtoggle">
        <button class="${state.calView==='month'?'on':''}" onclick="state.calView='month';render()">Month</button>
        <button class="${state.calView==='week'?'on':''}" onclick="state.calView='week';render()">Week</button>
        <button class="${state.calView==='day'?'on':''}" onclick="state.calView='day';render()">Day</button>
        <button class="${state.calView==='list'?'on':''}" onclick="state.calView='list';render()">List</button>
      </div>
      <button class="bp bsm" onclick="openSchedForm()">＋ Schedule</button>
    </div>
  </div>

  ${state.calView==='month'?renderCalMonth(allEvts):''}
  ${state.calView==='week'?renderCalWeek(allEvts):''}
  ${state.calView==='day'?renderCalDay(allEvts):''}
  ${state.calView==='list'?renderSchedList(active,done):''}
  `;
}

function renderCalMonth(evts){
  const d=state.calDate;const y=d.getFullYear(),m=d.getMonth();
  const first=new Date(y,m,1);const startDay=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const todayStr=td();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  let cells='';
  // Previous month days
  for(let i=startDay-1;i>=0;i--){
    const prevDs=`${m===0?y-1:y}-${String(m===0?12:m).padStart(2,'0')}-${String(daysInPrev-i).padStart(2,'0')}`;
    cells+=`<div class="cal-cell other" data-date="${prevDs}" ondragover="calDragOver(event)" ondrop="calDrop(event,'${prevDs}')"><div class="cd">${daysInPrev-i}</div></div>`;
  }
  // Current month
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const dayEvts=evts.filter(e=>e.date===ds);
    cells+=`<div class="cal-cell ${isToday?'today':''}" data-date="${ds}" ondragover="calDragOver(event)" ondragleave="calDragLeave(event)" ondrop="calDrop(event,'${ds}')"><div class="cd">${day}</div>${dayEvts.slice(0,3).map(e=>{
      const draggable=e.type==='sched'?'draggable="true" ondragstart="calDragStart(event,\''+e.id+'\')"':'';
      return`<div class="cal-evt ce-${e.type}" ${draggable} onclick="${e.type==='sched'?`event.stopPropagation();openSchedForm('${e.id}')`:e.catId?`event.stopPropagation();goToItem('${e.catId}','${e.itemId}')`:''}">${e.type==='sched'?'📅':'⚠'} ${esc(e.title).slice(0,15)}</div>`;
    }).join('')}${dayEvts.length>3?`<div style="font-size:8px;color:var(--dim)">+${dayEvts.length-3} more</div>`:''}</div>`;
  }
  // Next month fill
  const totalCells=startDay+daysInMonth;const remaining=7-(totalCells%7);
  if(remaining<7){for(let i=1;i<=remaining;i++){
    const nextDs=`${m===11?y+1:y}-${String(m===11?1:m+2).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    cells+=`<div class="cal-cell other" data-date="${nextDs}" ondragover="calDragOver(event)" ondrop="calDrop(event,'${nextDs}')"><div class="cd">${i}</div></div>`;
  }}

  return`<div class="cal">
    <div class="cal-hdr">
      <button onclick="state.calDate=new Date(${y},${m-1},1);render()">◀</button>
      <div class="cal-title">${monthNames[m]} ${y}</div>
      <button onclick="state.calDate=new Date(${y},${m+1},1);render()">▶</button>
    </div>
    <div class="cal-grid">
      <div class="cal-day-hdr">Sun</div><div class="cal-day-hdr">Mon</div><div class="cal-day-hdr">Tue</div><div class="cal-day-hdr">Wed</div><div class="cal-day-hdr">Thu</div><div class="cal-day-hdr">Fri</div><div class="cal-day-hdr">Sat</div>
      ${cells}
    </div>
    <div style="padding:8px 14px;font-size:10px;color:var(--dim);border-top:1px solid var(--border)">💡 Drag & drop 📅 scheduled items to reschedule them</div>
  </div>`;
}

// Drag & Drop handlers
let dragSchedId=null;
function calDragStart(e,id){dragSchedId=id;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id)}
function calDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over')}
function calDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function calDrop(e,newDate){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  const id=dragSchedId||e.dataTransfer.getData('text/plain');
  if(!id)return;
  const s=D.scheduled.find(x=>x.id===id);
  if(!s)return;
  const oldDate=s.date;
  if(oldDate===newDate)return;
  s.date=newDate;
  s.lastModified=td();
  if(!s.changeLog)s.changeLog=[];
  s.changeLog.push({date:td(),time:new Date().toLocaleTimeString(),change:'Rescheduled from '+oldDate+' to '+newDate+' (drag & drop)'});
  sendNotification();
  saveData();render();
  dragSchedId=null;
}

  return`<div class="cal">

function saveSched(){
  const title=document.getElementById('sc-title').value.trim();
  if(!title){alert('Add a title');return}
  const editId=document.getElementById('sc-editid').value;
  const isEdit=!!editId;
  
  const itemVal=document.getElementById('sc-item').value;
  let catId='',itemId='',itemName='';
  if(itemVal){
    const parts=itemVal.split('|');catId=parts[0];itemId=parts[1];
    const it=(D.items[catId]||[]).find(i=>i.id===itemId);
    itemName=it?it.name:'';
  }
  
  const newDate=document.getElementById('sc-date').value;
  const newPri=document.getElementById('sc-pri').value;
  const newTech=document.getElementById('sc-tech').value;
  const newCost=document.getElementById('sc-cost').value;
  const newDesc=document.getElementById('sc-desc').value;
  const newReqEmail=document.getElementById('sc-reqemail').value.trim();
  
  if(isEdit){
    const s=D.scheduled.find(x=>x.id===editId);
    if(!s)return;
    
    // Track changes
    const changes=[];
    if(s.date!==newDate)changes.push('Date changed from '+s.date+' to '+newDate);
    if(s.priority!==newPri)changes.push('Priority changed to '+PRI[newPri].l);
    if(s.title!==title)changes.push('Title changed to "'+title+'"');
    if(s.assignedTo!==newTech)changes.push('Technician changed from "'+(s.assignedTo||'none')+'" to "'+(newTech||'none')+'"');
    if(s.description!==newDesc)changes.push('Description updated');
    if((s.catId+'|'+s.itemId)!==(catId+'|'+itemId))changes.push('Equipment changed to '+(itemName||'General'));
    
    // Update the schedule
    const oldDate=s.date;
    s.date=newDate;s.title=title;s.catId=catId;s.itemId=itemId;s.itemName=itemName;
    s.priority=newPri;s.assignedTo=newTech;s.estCost=newCost;s.description=newDesc;
    s.requesterEmail=newReqEmail;
    s.lastModified=td();
    
    // Add to change log
    if(changes.length>0){
      if(!s.changeLog)s.changeLog=[];
      s.changeLog.push({date:td(),time:new Date().toLocaleTimeString(),change:changes.join('; ')});
      
      // Send notifications
      const emailSubject='Schedule Modified: '+title;
      const emailBody='The following maintenance schedule has been updated:\\n\\n'+
        'Title: '+title+'\\n'+
        'Date: '+newDate+(oldDate!==newDate?' (was: '+oldDate+')':'')+  '\\n'+
        'Equipment: '+(itemName||'General')+'\\n'+
        'Technician: '+(newTech||'N/A')+'\\n'+
        'Changes: '+changes.join(', ')+'\\n\\n'+
        'Modified on: '+td()+' at '+new Date().toLocaleTimeString();
      
      // Notify admin
      sendNotification(emailSubject,emailBody);
      
      // Notify requester if different from admin
      if(newReqEmail&&newReqEmail!==EMAILJS.notifyEmail){
        sendNotification(emailSubject,emailBody,newReqEmail);
      }
    }
  } else {
    // New schedule
    const newSched={
      id:gid(),date:newDate,title,catId,itemId,itemName,
      priority:newPri,assignedTo:newTech,estCost:newCost,
      description:newDesc,requesterEmail:newReqEmail,
      done:false,createdAt:td(),changeLog:[{date:td(),time:new Date().toLocaleTimeString(),change:'Created'}]
    };
    D.scheduled.push(newSched);
    
    // Send notification for new schedule
    const emailBody='New maintenance has been scheduled:\\n\\n'+
      'Title: '+title+'\\n'+
      'Date: '+newDate+'\\n'+
      'Equipment: '+(itemName||'General')+'\\n'+
      'Technician: '+(newTech||'N/A')+'\\n'+
      'Priority: '+PRI[newPri].l+'\\n'+
      (newDesc?'Notes: '+newDesc+'\\n':'')+
      '\\nCreated on: '+td();
    sendNotification('New Schedule: '+title,emailBody);
    if(newReqEmail&&newReqEmail!==EMAILJS.notifyEmail){
      sendNotification('Maintenance Scheduled: '+title,'Your maintenance request has been scheduled:\\n\\n'+emailBody,newReqEmail);
    }
  }
  
  saveData();mrClear();render();
}

function markSchedDone(id){
  const s=D.scheduled.find(x=>x.id===id);
  if(!s)return;
  s.done=true;
  s.completedAt=td();
  if(!s.changeLog)s.changeLog=[];
  s.changeLog.push({date:td(),time:new Date().toLocaleTimeString(),change:'Marked as completed'});
  
  sendNotification('Completed: '+s.title,'Maintenance completed:\\n\\nTitle: '+s.title+'\\nEquipment: '+(s.itemName||'General')+'\\nCompleted on: '+td());
  if(s.requesterEmail&&s.requesterEmail!==EMAILJS.notifyEmail){
    sendNotification('Maintenance Completed: '+s.title,'Your scheduled maintenance has been completed:\\n\\nTitle: '+s.title+'\\nDate: '+s.date+'\\nCompleted on: '+td(),s.requesterEmail);
  }
  saveData();render();
}

function delSched(id){
  const s=D.scheduled.find(x=>x.id===id);
  if(s){
    sendNotification('Cancelled: '+s.title,'Maintenance cancelled:\\n\\nTitle: '+s.title+'\\nWas scheduled for: '+s.date+'\\nEquipment: '+(s.itemName||'General'));
    if(s.requesterEmail&&s.requesterEmail!==EMAILJS.notifyEmail){
      sendNotification('Maintenance Cancelled: '+s.title,'Your scheduled maintenance has been cancelled:\\n\\nTitle: '+s.title+'\\nDate: '+s.date,s.requesterEmail);
    }
  }
  D.scheduled=D.scheduled.filter(x=>x.id!==id);
  saveData();render();
}

function openViewer(id){state.viewer=getItems().find(i=>i.id===id);state.addingLog=false;if(state.viewer)renderViewer()}
function closeViewer(){state.viewer=null;state.viewInvoice=null;mrClear();render()}

function renderViewer(){
  if(!state.viewer)return;
  const it=state.viewer,cat=getCat();
  const logs=(it.maintenanceLog||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const mL=logs.filter(l=>l.recordType!=='fuel'),fL=logs.filter(l=>l.recordType==='fuel');
  const sc=calcScore(it),tc=logs.reduce((s,l)=>s+Number(l.cost||0),0);

  // Avg miles/hours between services
  const wM=mL.filter(l=>l.mileageAtService).sort((a,b)=>a.mileageAtService-b.mileageAtService);
  let avgM='—';if(wM.length>=2){let d=[];for(let i=1;i<wM.length;i++)d.push(wM[i].mileageAtService-wM[i-1].mileageAtService);avgM=Math.round(d.reduce((a,b)=>a+b,0)/d.length).toLocaleString()}
  const wD=mL.filter(l=>l.date).sort((a,b)=>a.date.localeCompare(b.date));
  let avgD='—';if(wD.length>=2){let d=[];for(let i=1;i<wD.length;i++)d.push(dbtw(wD[i-1].date,wD[i].date));avgD=Math.round(d.reduce((a,b)=>a+b,0)/d.length)}

  // Parts frequency & cost
  const pf={},pcost={};mL.forEach(l=>{if(l.partCategory){pf[l.partCategory]=(pf[l.partCategory]||0)+1;if(l.cost)pcost[l.partCategory]=(pcost[l.partCategory]||0)+Number(l.cost)}});
  const topP=Object.entries(pf).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const topC=Object.entries(pcost).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Fuel stats
  const tGal=fL.reduce((s,l)=>s+Number(l.fuelGallons||0),0);
  const tFC=fL.reduce((s,l)=>s+Number(l.cost||0),0);
  const fwm=fL.filter(l=>l.mileageAtService).sort((a,b)=>a.mileageAtService-b.mileageAtService);
  let mpg='—';if(fwm.length>=2){let tm=0,tg=0;for(let i=1;i<fwm.length;i++){tm+=fwm[i].mileageAtService-fwm[i-1].mileageAtService;tg+=Number(fwm[i].fuelGallons||0)}if(tg>0)mpg=(tm/tg).toFixed(1)}

  // Monthly cost chart
  const mc={};logs.forEach(l=>{if(l.date&&l.cost){const m=l.date.slice(0,7);mc[m]=(mc[m]||0)+Number(l.cost)}});
  const chData=Object.entries(mc).sort().slice(-8).map(([m,v])=>({l:m.slice(5),v:Math.round(v),c:'var(--accent)'}));

  const isV=cat.id==='vehicles',isF=cat.id==='forklifts';

  const mr=document.getElementById('modal-root');
  mr.innerHTML=`
  <div class="mover" onclick="closeViewer()">
    <div class="modal wide" onclick="event.stopPropagation()">
      <div class="mhdr">
        <h3>📋 ${esc(it.name)||'Profile'}</h3>
        <div style="display:flex;gap:8px">
          <button class="bs bsm" onclick="closeViewer();openEditor('${it.id}')">✏️ Edit</button>
          <button class="bi" onclick="closeViewer()">✕</button>
        </div>
      </div>
      <div class="mbody">
        <div class="prohdr">
          <div class="prophoto">${it.photo?`<img src="${it.photo}">`:`<span class="pp">${cat.icon}</span>`}</div>
          <div class="prodet">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div><h2>${[it.year,it.make,it.model].filter(Boolean).map(esc).join(' ')||esc(it.name)||'—'}</h2><div class="psub">${esc(it.type)} · ${badge(it.status)}</div></div>
              ${scoreRing(sc)}
            </div>
            <div class="specs">
              <div class="spec"><div class="sl">${esc(cat.iL)}</div><div class="sv">${esc(it[cat.iK])||'—'}</div></div>
              ${isV?`<div class="spec"><div class="sl">VIN</div><div class="sv">${esc(it.vin)||'—'}</div></div><div class="spec"><div class="sl">Mileage</div><div class="sv">${it.mileage?Number(it.mileage).toLocaleString():'—'}</div></div><div class="spec"><div class="sl">Color</div><div class="sv">${esc(it.color)||'—'}</div></div>`:''}
              ${isF?`<div class="spec"><div class="sl">Hours</div><div class="sv">${it.hours?Number(it.hours).toLocaleString():'—'}</div></div><div class="spec"><div class="sl">Capacity</div><div class="sv">${esc(it.capacity)||'—'}</div></div>`:''}
              ${!isV&&!isF?`<div class="spec"><div class="sl">${esc(cat.uL)}</div><div class="sv">${it[cat.uK]?Number(it[cat.uK]).toLocaleString():'—'}</div></div>`:''}
              <div class="spec"><div class="sl">Last Svc</div><div class="sv">${it.lastService||'—'}</div></div>
              <div class="spec ${od(it.nextService)?'warn':''}"><div class="sl">Next Svc</div><div class="sv">${it.nextService||'—'}${od(it.nextService)?' ⚠':''}</div></div>
            </div>
            ${it.notes?`<p style="margin-top:8px;font-size:12px;color:var(--dim)">📝 ${esc(it.notes)}</p>`:''}
          </div>
        </div>

        <!-- Analysis -->
        <div class="ag">
          <div class="ac"><div class="al">Services</div><div class="av" style="color:var(--accent)">${mL.length}</div><div class="as">records</div></div>
          <div class="ac"><div class="al">Total Cost</div><div class="av" style="color:var(--grn)">$${tc.toLocaleString()}</div><div class="as">all records</div></div>
          <div class="ac"><div class="al">Avg ${esc(cat.uL)} Btw</div><div class="av" style="color:var(--yel)">${avgM}</div><div class="as">${cat.uL.toLowerCase()}</div></div>
          <div class="ac"><div class="al">Avg Days Btw</div><div class="av" style="color:var(--cyn)">${avgD}</div><div class="as">days</div></div>
          ${fL.length>0?`<div class="ac"><div class="al">Fuel</div><div class="av" style="color:#f97316">${tGal.toFixed(1)}g</div><div class="as">$${tFC.toLocaleString()}</div></div><div class="ac"><div class="al">Avg MPG</div><div class="av" style="color:#f97316">${mpg}</div><div class="as">mi/gal</div></div>`:''}
        </div>

        <!-- Charts -->
        <div class="chart-row">
          <div class="chart-box">${barChart(chData,100,'Cost by Month ($)')}</div>
          ${topP.length>0?`<div class="chart-box">${barChart(topP.map(([n,c])=>({l:n.slice(0,7),v:c,c:'var(--cyn)'})),100,'Parts Frequency')}</div>`:`<div class="chart-box">${barChart([],100,'Parts Frequency')}</div>`}
        </div>

        ${topC.length>0?`<div class="tags">${topC.map(([n,c])=>`<span class="tag" style="background:var(--gbg);color:var(--grn)">${esc(n)}: $${c.toLocaleString()}</span>`).join('')}</div>`:''}

        <!-- Records -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h4 style="font-size:14px;font-weight:700">🔧 Service & Fuel History (${logs.length})</h4>
          ${!state.addingLog?`<button class="bp bsm" onclick="state.addingLog=true;renderViewer()">＋ Add Record</button>`:''}
        </div>

        <div id="log-add-area">${state.addingLog?renderAddForm(cat):''}</div>

        ${logs.length>0?`
        <div style="overflow-x:auto">
          <table class="ltbl">
            <thead><tr><th></th><th>Date</th><th>${esc(cat.uL)}</th><th>Type</th><th>Category</th><th>Part</th><th>Description</th><th>Tech</th><th>Cost</th><th>P</th><th>Inv</th><th></th></tr></thead>
            <tbody>${logs.map(l=>{
              const isFuel=l.recordType==='fuel';
              return`<tr style="${l.completed?'opacity:.4':''}">
                <td><button class="bi" style="width:22px;height:22px;font-size:10px;${l.completed?'background:var(--accent);color:#fff;border:none':'border:2px solid var(--border);background:transparent'};border-radius:5px" onclick="toggleLog('${l.id}')">${l.completed?'✓':''}</button></td>
                <td class="mono" style="white-space:nowrap">${l.date||'—'}</td>
                <td class="mono">${l.mileageAtService?Number(l.mileageAtService).toLocaleString():'—'}</td>
                <td style="font-size:11px">${isFuel?'<span style="color:#f97316;font-weight:600">⛽</span>':'<span style="color:var(--accent)">🔧</span>'}</td>
                <td style="font-size:11px">${isFuel?(l.fuelGallons||'—')+'g':esc(l.partCategory)||'—'}</td>
                <td style="font-size:11px">${esc(l.partDetail)||'—'}</td>
                <td style="font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.description)||'—'}</td>
                <td style="font-size:11px">${esc(l.technician)||'—'}</td>
                <td class="mono cost">${l.cost?'$'+Number(l.cost).toLocaleString():'—'}</td>
                <td>${priDot(l.priority)}</td>
                <td>${l.invoicePhoto?`<button class="bi" style="width:22px;height:22px;font-size:10px" onclick="viewInvoice('${l.id}')">🧾</button>`:'<span style="font-size:10px;color:var(--dim)">—</span>'}</td>
                <td><button class="bi danger" style="width:22px;height:22px;font-size:10px" onclick="removeLog('${l.id}')">🗑</button></td>
              </tr>`;}).join('')}
            </tbody>
          </table>
        </div>
        <div class="totals">
          <span>Records: <strong>${logs.length}</strong></span>
          <span>Done: <strong>${logs.filter(l=>l.completed).length}</strong></span>
          <span>Pending: <strong>${logs.filter(l=>!l.completed).length}</strong></span>
          <span>Cost: <strong style="color:var(--grn)">$${tc.toLocaleString()}</strong></span>
        </div>
        `:`<p style="text-align:center;color:var(--dim);padding:24px;font-size:13px">No records yet. Add the first one.</p>`}
      </div>
    </div>
  </div>
  ${state.viewInvoice?`<div class="inv-over" onclick="state.viewInvoice=null;renderViewer()"><img src="${state.viewInvoice}"></div>`:''}`;
}

        ${d.invoicePhoto?'<span style="font-size:11px;color:var(--grn)">✓ Attached</span>':''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="bs" onclick="state.addingLog=false;renderViewer()">Cancel</button>
        <button class="bp bsm" onclick="saveLogEntry()">💾 Save</button>

function resetAddRec(){addRecData={id:gid(),date:td(),mileageAtService:'',priority:'medium',partCategory:'',partDetail:'',cost:'',technician:'',description:'',completed:false,invoicePhoto:'',recordType:'maintenance',fuelGallons:'',fuelCostPerGal:''}}

function saveLogEntry(){
  const d=addRecData;
  if(d.recordType==='maintenance'&&!d.description.trim()){alert('Add a description');return}
  if(d.recordType==='fuel'&&!d.fuelGallons){alert('Enter gallons');return}
  if(d.recordType==='fuel'&&!d.cost&&d.fuelGallons&&d.fuelCostPerGal)d.cost=(Number(d.fuelGallons)*Number(d.fuelCostPerGal)).toFixed(2);
  if(d.recordType==='fuel'&&!d.description)d.description='Fuel: '+d.fuelGallons+' gal';
  if(!state.viewer.maintenanceLog)state.viewer.maintenanceLog=[];
  state.viewer.maintenanceLog.unshift({...d});
  syncViewer();state.addingLog=false;resetAddRec();renderViewer();
}

function toggleLog(lid){const l=(state.viewer.maintenanceLog||[]).find(x=>x.id===lid);if(l)l.completed=!l.completed;syncViewer();renderViewer()}
function removeLog(lid){state.viewer.maintenanceLog=(state.viewer.maintenanceLog||[]).filter(x=>x.id!==lid);syncViewer();renderViewer()}
function viewInvoice(lid){const l=(state.viewer.maintenanceLog||[]).find(x=>x.id===lid);if(l&&l.invoicePhoto){state.viewInvoice=l.invoicePhoto;renderViewer()}}

function syncViewer(){
  const items=getItems();
  const idx=items.findIndex(i=>i.id===state.viewer.id);
  if(idx>=0)items[idx]=state.viewer;
  setItems(items);
}

let edData=null;

function openEditor(id){
  const cat=getCat();
  if(id){const f=getItems().find(i=>i.id===id);if(f)edData=JSON.parse(JSON.stringify(f));else return;state.editorNew=false}
  else{edData={id:gid(),name:'',type:'',make:'',model:'',year:'',status:'operational',lastService:'',nextService:'',notes:'',photo:'',maintenanceLog:[],[cat.iK]:'',[cat.uK]:''};if(cat.id==='vehicles'){edData.vin='';edData.color=''}if(cat.id==='forklifts'){edData.capacity=''}state.editorNew=true}
  renderEditor();
}

function closeEditor(){edData=null;mrClear();render()}

function renderEditor(){
  if(!edData)return;
  const cat=getCat(),isV=cat.id==='vehicles',isF=cat.id==='forklifts';
  const title=state.editorNew?'New '+cat.name.replace(/s$/,''):'Edit '+cat.name.replace(/s$/,'');

  const mr=document.getElementById('modal-root');
  mr.innerHTML=`
  <div class="mover" onclick="closeEditor()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="mhdr"><h3>${title}</h3><button class="bi" onclick="closeEditor()">✕</button></div>
      <div class="mbody">
        <div class="pharea">
          <div class="phprev" onclick="openFileDialog(data=>{edData.photo=data;renderEditor()})">
            ${edData.photo?`<img src="${edData.photo}">`:`<div class="pp"><span>📷</span>Click to add</div>`}
          </div>
          <div style="flex:1;font-size:12px;color:var(--dim)"><p>Upload a photo. Saved locally.</p>${edData.photo?`<button class="bs bsm" style="margin-top:6px" onclick="edData.photo='';renderEditor()">Remove</button>`:''}</div>
        </div>
        <div class="fg">
          <div class="fd"><label>Name / ID</label><input id="e-name" value="${esc(edData.name)}"></div>
          <div class="fd"><label>Type</label><input id="e-type" value="${esc(edData.type)}" placeholder="${isV?'Pickup, SUV':'Type'}"></div>
          <div class="fd"><label>Make</label><input id="e-make" value="${esc(edData.make)}"></div>
          <div class="fd"><label>Model</label><input id="e-model" value="${esc(edData.model)}"></div>
          <div class="fd"><label>Year</label><input id="e-year" type="number" value="${esc(edData.year)}"></div>
          ${isV?`<div class="fd"><label>Color</label><input id="e-color" value="${esc(edData.color)}"></div>`:''}
          <div class="fd"><label>${esc(cat.iL)}</label><input id="e-idk" value="${esc(edData[cat.iK])}"></div>
          ${isV?`<div class="fd"><label>VIN</label><input id="e-vin" value="${esc(edData.vin)}" maxlength="17" style="text-transform:uppercase"></div>`:''}
          <div class="fd"><label>${esc(cat.uL)}</label><input id="e-use" type="number" value="${esc(edData[cat.uK])}"></div>
          ${isF?`<div class="fd"><label>Capacity (lbs)</label><input id="e-cap" value="${esc(edData.capacity)}"></div>`:''}
          <div class="fd"><label>Status</label><select id="e-status">${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${edData.status===k?'selected':''}>${v.l}</option>`).join('')}</select></div>
          <div class="fd"><label>Last Service</label><input id="e-last" type="date" value="${esc(edData.lastService)}"></div>
          <div class="fd"><label>Next Service</label><input id="e-next" type="date" value="${esc(edData.nextService)}"></div>
          <div class="fd full"><label>Notes</label><textarea id="e-notes">${esc(edData.notes)}</textarea></div>
        </div>
      </div>
      <div class="mfoot">
        <button class="bs" onclick="closeEditor()">Cancel</button>
        <button class="bp" onclick="saveEditor()">💾 Save</button>
      </div>
    </div>
  </div>`;
}

function saveEditor(){
  const cat=getCat(),isV=cat.id==='vehicles',isF=cat.id==='forklifts';
  edData.name=document.getElementById('e-name').value;
  edData.type=document.getElementById('e-type').value;
  edData.make=document.getElementById('e-make').value;
  edData.model=document.getElementById('e-model').value;
  edData.year=document.getElementById('e-year').value;
  edData[cat.iK]=document.getElementById('e-idk').value;
  edData[cat.uK]=document.getElementById('e-use').value;
  edData.status=document.getElementById('e-status').value;
  edData.lastService=document.getElementById('e-last').value;
  edData.nextService=document.getElementById('e-next').value;
  edData.notes=document.getElementById('e-notes').value;
  if(isV){edData.vin=(document.getElementById('e-vin')?.value||'').toUpperCase();edData.color=document.getElementById('e-color')?.value||''}
  if(isF){edData.capacity=document.getElementById('e-cap')?.value||''}

  const items=getItems();
  const idx=items.findIndex(i=>i.id===edData.id);
  if(idx>=0)items[idx]=edData;else items.unshift(edData);
  setItems(items);
  if(state.viewer&&state.viewer.id===edData.id)state.viewer=edData;
  closeEditor();
}

        </div>
      </div>
      <div class="mfoot">
        <button class="bs" onclick="closeCatMgr()">Cancel</button>
        <button class="bp" onclick="saveCats()">💾 Save</button>
      </div>
    </div>
  </div>`;
}

function addNewCat(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name)return;
  const icon=document.getElementById('nc-icon').value||'🔧';
  const track=document.getElementById('nc-track').value;
  const idl=document.getElementById('nc-idl').value||'ID #';
  const id=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+gid().slice(0,4);
  catEdCats.push({id,name,icon,uL:track==='miles'?'Miles':track==='hours'?'Hours':'Units',uK:track==='miles'?'mileage':track==='hours'?'hours':'units_count',iL:idl,iK:'serialNumber',extra:[]});
  renderCatMgr();
}

function saveCats(){
  D.categories=catEdCats;
  if(!D.categories.find(c=>c.id===D.activeTab))D.activeTab=D.categories[0]?.id;
  saveData();closeCatMgr();
}

// ═══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
function exportExcel(){
  // Build CSV content for each category + scheduled
  let csv='';
  
  // Sheet: All Equipment
  csv+='=== ALL EQUIPMENT ===\n';
  csv+='Category,Name,Type,Make,Model,Year,Status,ID/Plate,VIN,Mileage/Hours,Color,Last Service,Next Service,Health Score,Total Cost,Notes\n';
  D.categories.forEach(cat=>{
    (D.items[cat.id]||[]).forEach(it=>{
      const tc=(it.maintenanceLog||[]).reduce((s,l)=>s+Number(l.cost||0),0);
      const sc=calcScore(it);
      csv+=csvRow([cat.name,it.name,it.type,it.make,it.model,it.year,STATUS[it.status]?.l||it.status,it[cat.iK],it.vin||'',it[cat.uK],it.color||'',it.lastService,it.nextService,sc,tc,it.notes])+'\n';
    });
  });

  // Sheet: All Maintenance Records
  csv+='\n=== MAINTENANCE RECORDS ===\n';
  csv+='Category,Equipment,Date,Type,Miles/Hours,Part Category,Specific Part,Description,Technician,Cost,Priority,Completed,Fuel Gallons,Fuel $/Gal\n';
  D.categories.forEach(cat=>{
    (D.items[cat.id]||[]).forEach(it=>{
      (it.maintenanceLog||[]).forEach(l=>{
        csv+=csvRow([cat.name,it.name,l.date,l.recordType||'maintenance',l.mileageAtService,l.partCategory,l.partDetail,l.description,l.technician,l.cost,PRI[l.priority]?.l||l.priority,l.completed?'Yes':'No',l.fuelGallons||'',l.fuelCostPerGal||''])+'\n';
      });
    });
  });

  // Sheet: Scheduled Maintenance
  csv+='\n=== SCHEDULED MAINTENANCE ===\n';
  csv+='Date,Title,Equipment,Priority,Technician,Est. Cost,Description,Status\n';
  (D.scheduled||[]).forEach(s=>{
    csv+=csvRow([s.date,s.title,s.itemName||'General',PRI[s.priority]?.l||s.priority,s.assignedTo,s.estCost,s.description,s.done?'Completed':'Pending'])+'\n';
  });

  downloadFile('Fleet_Maintenance_'+td()+'.csv',csv,'text/csv');
}

function csvRow(arr){
  return arr.map(v=>{
    const s=String(v||'').replace(/"/g,'""');
    return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s+'"':s;
  }).join(',');
}

function exportJSON(){
  const data=JSON.stringify(D,null,2);
  downloadFile('Fleet_Backup_'+td()+'.json',data,'application/json');
}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type:type+';charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('import-in').addEventListener('change',function(e){
  const file=e.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.categories){alert('Invalid backup file — no categories found');return}
      if(!confirm('This will replace ALL current data with the backup. Are you sure?'))return;
      D.categories=data.categories||DEF_CATS;
      D.items=data.items||{};
      D.activeTab=data.activeTab||DEF_CATS[0].id;
      D.scheduled=data.scheduled||[];
      saveData();
      render();
      alert('✅ Data restored successfully! '+Object.values(D.items).reduce((s,a)=>s+(a?a.length:0),0)+' items loaded.');
    }catch(err){
      alert('Error reading file: '+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value='';
});

function switchTab(id){D.activeTab=id;state.search='';state.filter='all';saveData();render()}
function delItem(id){if(!confirm('Delete this record?'))return;setItems(getItems().filter(i=>i.id!==id));if(state.viewer&&state.viewer.id===id)closeViewer();render()}
function mrClear(){document.getElementById('modal-root').innerHTML=''}

// Wrap render to always update sync bar
const _baseRender=render;
render=function(){_baseRender();renderSyncBar()};

// Init
loadData();
</script>
